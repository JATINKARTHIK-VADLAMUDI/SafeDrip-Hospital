<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Login</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0d5b99,#39c4d8);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:350px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    text-align:center;
}

.logo{
    font-size:55px;
}

h1{
    color:#0d5b99;
}

select,input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;

}

button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d5b99;
    color:white;
    font-size:18px;
    cursor:pointer;

}

button:hover{

    background:#083d66;

}

.back{

    display:block;
    margin-top:20px;
    color:#0d5b99;
    text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">🏥</div>

<h1>Staff Login</h1>

<select id="role">

<option>Admin</option>

<option>Doctor</option>

<option>Nurse</option>

</select>

<input
id="username"
type="text"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">

LOGIN

</button>

<a class="back" href="home.html">

← Back

</a>

</div>

<script>

const SERVER = "https://safedrip-backend.onrender.com";

async function login(){

    const role = document.getElementById("role").value;

    const username = document.getElementById("username").value;

    const password = document.getElementById("password").value;

    try{

        const response = await fetch(SERVER + "/api/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                username:username,
                password:password
            })

        });

        const result = await response.json();

        if(!result.success){

            alert(result.message);

            return;

        }

        if(result.role !== role){

            alert("Selected role does not match your account.");

            return;

        }

        localStorage.setItem("userName", result.name);
        localStorage.setItem("userRole", result.role);

        if(result.role==="Admin"){

            window.location.href="admin.html";

        }

        else if(result.role==="Doctor"){

            window.location.href="doctor.html";

        }

        else if(result.role==="Nurse"){

            window.location.href="nurse.html";

        }

    }

    catch(err){

        console.log(err);

        alert("Unable to connect to the server.");

    }

}

</script>

</body>
</html>
