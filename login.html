<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Login</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0d5b99,#39c4d8);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:350px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    text-align:center;
}

.logo{
    font-size:55px;
}

h1{
    color:#0d5b99;
}

select,input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;

}

button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d5b99;
    color:white;
    font-size:18px;
    cursor:pointer;

}

button:hover{

    background:#083d66;

}

.back{

    display:block;
    margin-top:20px;
    color:#0d5b99;
    text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">🏥</div>

<h1>Staff Login</h1>

<select id="role">

<option>Admin</option>

<option>Doctor</option>

<option>Nurse</option>

</select>

<input
id="username"
type="text"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">

LOGIN

</button>

<a class="back" href="home.html">

← Back

</a>

</div>

<script>

function login(){

const role=document.getElementById("role").value;

const user=document.getElementById("username").value;

const pass=document.getElementById("password").value;

if(role==="Admin" && user==="admin" && pass==="admin123"){

window.location.href="admin.html";

}

else if(role==="Doctor" && user==="doctor" && pass==="doctor123"){

window.location.href="doctor.html";

}

else if(role==="Nurse" && user==="nurse" && pass==="nurse123"){

window.location.href="nurse.html";

}

else{

alert("Invalid Login");

}

}

</script>

</body>
</html>
