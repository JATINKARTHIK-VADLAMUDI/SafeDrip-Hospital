<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Select Bed</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="logo">
🛏️
</div>

<h1 id="wardTitle"></h1>

<h2>Select Bed</h2>

<div id="beds"></div>

<a class="back" href="ward.html">
← Back
</a>

</div>

<script src="script.js"></script>

<script>

const ward = localStorage.getItem("selectedWard");

document.getElementById("wardTitle").innerHTML = ward;

const bedArea=document.getElementById("beds");

/*
------------------------------------------------

CHANGE ONLY THESE LINKS

Later you'll replace them with your
Netlify dashboard links.

------------------------------------------------
*/

const dashboardLinks={

"Bed-01":"https://safedrip.netlify.app/",
"Bed-02":"https://safedrip.netlify.app/",
"Bed-03":"https://safedrip.netlify.app/",
"Bed-04":"https://safedrip.netlify.app/",
"Bed-05":"https://safedrip.netlify.app/",
"Bed-06":"https://safedrip.netlify.app/",
"Bed-07":"https://safedrip.netlify.app/",
"Bed-08":"https://safedrip.netlify.app/",
"Bed-09":"https://safedrip.netlify.app/",
"Bed-10":"https://safedrip.netlify.app/"

};

Object.keys(dashboardLinks).forEach(function(bed){

const url =
dashboardLinks[bed] +
"?floor=" + encodeURIComponent(localStorage.getItem("selectedFloor")) +
"&ward=" + encodeURIComponent(localStorage.getItem("selectedWard")) +
"&bed=" + encodeURIComponent(bed);

bedArea.innerHTML += `
<div class="card" onclick="window.location.href='${url}'">
${bed}
</div>
`;

});

</script>

</body>

</html>
