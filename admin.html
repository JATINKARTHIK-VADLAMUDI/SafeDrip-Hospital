<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeDrip Admin</title>

<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#f4f7fb;

}

.header{

background:#0d5b99;

color:white;

padding:20px;

font-size:28px;

font-weight:bold;

text-align:center;

}

.welcome{

text-align:center;

padding:20px;

font-size:22px;

font-weight:bold;

color:#0d5b99;

}


.logout{

display:block;

width:220px;

margin:30px auto;

padding:15px;

text-align:center;

background:red;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:bold;

}

.dashboard{

display:flex;

margin:20px;

gap:20px;

}

.sidebar{

width:240px;

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

display:flex;

flex-direction:column;

gap:12px;

}

.menu{

padding:15px;

font-size:18px;

border:none;

background:#f4f7fb;

border-radius:10px;

cursor:pointer;

text-align:left;

transition:.3s;

}

.menu:hover{

background:#0d5b99;

color:white;

}

.active{

background:#0d5b99;

color:white;

}

.content{

flex:1;

background:white;

border-radius:15px;

padding:30px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

min-height:550px;

}

</style>

</head>

<body>

<div class="header">

🏥 SafeDrip Admin Dashboard

</div>

<div class="welcome">

Welcome,

<span id="adminName"></span>

</div>
  
<div class="dashboard">

<div class="sidebar">

<button class="menu active">
🏠 Dashboard
</button>

<button class="menu">
👤 Patients
</button>

<button class="menu">
🛏 Beds
</button>

<button class="menu">
📡 Transmitters
</button>

<button class="menu">
👨‍⚕️ Doctors
</button>

<button class="menu">
👩‍⚕️ Nurses
</button>

<button class="menu">
📊 Reports
</button>

<button class="menu">
⚙ Settings
</button>

<a class="logout" href="login.html">

🚪 Logout

</a>

</div>

<div class="content">

<h2>Dashboard</h2>

<p>

Welcome to SafeDrip Hospital Management System.

</p>

</div>

</div>

<a class="logout" href="login.html">

Logout

</a>

<script>

document.getElementById("adminName").innerHTML=

localStorage.getItem("userName");

</script>

</body>

</html>
