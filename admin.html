<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeDrip Admin</title>

<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#f4f7fb;

}

.header{

background:#0d5b99;

color:white;

padding:20px;

font-size:28px;

font-weight:bold;

text-align:center;

}

.welcome{

text-align:center;

padding:20px;

font-size:22px;

font-weight:bold;

color:#0d5b99;

}


.dashboard{

display:flex;

margin:20px;

gap:20px;

}

.sidebar{

width:240px;

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

display:flex;

flex-direction:column;

gap:12px;

}

.menu{

padding:15px;

font-size:18px;

border:none;

background:#f4f7fb;

border-radius:10px;

cursor:pointer;

text-align:left;

transition:.3s;

}

.menu:hover{

background:#0d5b99;

color:white;

}

.active{

background:#0d5b99;

color:white;

}

.content{

flex:1;

background:white;

border-radius:15px;

padding:30px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

min-height:550px;

}

.logout{

display:block;

padding:15px;

text-align:center;

background:red;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:bold;

margin-top:20px;

}

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

margin-top:30px;

}

.stat{

background:#f4f7fb;

padding:20px;

border-radius:12px;

text-align:center;

box-shadow:0 5px 10px rgba(0,0,0,.1);

}

.stat h3{

margin:0;

color:#0d5b99;

}

.stat p{

font-size:32px;

font-weight:bold;

margin-top:15px;

}

.addBtn{

background:#0d5b99;

color:white;

padding:12px 25px;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

}

.addBtn:hover{

background:#083d66;

}

</style>

</head>

<body>

<div class="header">

🏥 SafeDrip Admin Dashboard

</div>

<div class="welcome">

Welcome,

<span id="adminName"></span>

</div>
  
<div class="dashboard">

<div class="sidebar">

<button class="menu active">
🏠 Dashboard
</button>

<button class="menu" onclick="showPatients()">

👤 Patients

</button>

<button class="menu">
🛏 Beds
</button>

<button class="menu">
📡 Transmitters
</button>

<button class="menu">
👨‍⚕️ Doctors
</button>

<button class="menu">
👩‍⚕️ Nurses
</button>

<button class="menu">
📊 Reports
</button>

<button class="menu">
⚙ Settings
</button>


</div>

<div class="content">

<h2>🏥 Hospital Overview</h2>

<div class="stats">

<div class="stat">
<h3>Total Patients</h3>
<p id="totalPatients">0</p>
</div>

<div class="stat">
<h3>Occupied Beds</h3>
<p id="occupiedBeds">0</p>
</div>

<div class="stat">
<h3>Active Transmitters</h3>
<p id="activeTransmitters">1</p>
</div>

<div class="stat">
<h3>Critical Alerts</h3>
<p id="criticalAlerts">0</p>
</div>

</div>

</div>

</div>

<a class="logout" href="login.html">

Logout

</a>

<script>

document.getElementById("adminName").innerHTML =
localStorage.getItem("userName");

function showPatients(){

document.querySelector(".content").innerHTML = `

<h2>👤 Patient Management</h2>

<button class="addBtn">

➕ Add Patient

</button>

<br><br>

<p>No patients added yet.</p>

`;

}

</script>

</body>

</html>
