<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeDrip Admin</title>

<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#f4f7fb;

}

.header{

background:#0d5b99;

color:white;

padding:20px;

font-size:28px;

font-weight:bold;

text-align:center;

}

.welcome{

text-align:center;

padding:20px;

font-size:22px;

font-weight:bold;

color:#0d5b99;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

padding:30px;

}

.card{

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

cursor:pointer;

text-align:center;

font-size:22px;

font-weight:bold;

transition:.3s;

}

.card:hover{

transform:scale(1.05);

background:#0d5b99;

color:white;

}

.logout{

display:block;

width:220px;

margin:30px auto;

padding:15px;

text-align:center;

background:red;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="header">

🏥 SafeDrip Admin Dashboard

</div>

<div class="welcome">

Welcome,

<span id="adminName"></span>

</div>

<div class="grid">

<div class="card">

👤

<br><br>

Patients

</div>

<div class="card">

🛏

<br><br>

Beds

</div>

<div class="card">

📡

<br><br>

Transmitters

</div>

<div class="card">

👨‍⚕️

<br><br>

Doctors

</div>

<div class="card">

👩‍⚕️

<br><br>

Nurses

</div>

<div class="card">

📊

<br><br>

Reports

</div>

</div>

<a class="logout" href="login.html">

Logout

</a>

<script>

document.getElementById("adminName").innerHTML=

localStorage.getItem("userName");

</script>

</body>

</html>
