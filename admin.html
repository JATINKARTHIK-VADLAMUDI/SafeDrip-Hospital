<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeDrip Admin</title>

<style> 

body{
 
margin:0;

font-family:Arial,sans-serif;

background:#f4f7fb;

}

.header{

background:#0d5b99;

color:white;

padding:20px;

font-size:28px;

font-weight:bold;

text-align:center;

}

.welcome{

text-align:center;

padding:20px;

font-size:22px;

font-weight:bold;

color:#0d5b99;

}


.dashboard{

display:flex;

margin:20px;

gap:20px;

}

.sidebar{

width:240px;

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

display:flex;

flex-direction:column;

gap:12px;

}

.menu{

padding:15px;

font-size:18px;

border:none;

background:#f4f7fb;

border-radius:10px;

cursor:pointer;

text-align:left;

transition:.3s;

}

.menu:hover{

background:#0d5b99;

color:white;

}

.active{

background:#0d5b99;

color:white;

}

.content{

flex:1;

background:white;

border-radius:15px;

padding:30px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

min-height:550px;

}

.logout{

display:block;

padding:15px;

text-align:center;

background:red;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:bold;

margin-top:20px;

}

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

margin-top:30px;

}

.stat{

background:#f4f7fb;

padding:20px;

border-radius:12px;

text-align:center;

box-shadow:0 5px 10px rgba(0,0,0,.1);

}

.stat h3{

margin:0;

color:#0d5b99;

}

.stat p{

font-size:32px;

font-weight:bold;

margin-top:15px;

}

.addBtn{

background:#0d5b99;

color:white;

padding:12px 25px;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

}

.addBtn:hover{

background:#083d66;

}

.patientForm{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

margin-top:20px;

}

.patientForm input,
.patientForm select{

padding:12px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}

.patientForm button{

grid-column:1/3;

}

.patientCard{

background:#f8f8f8;

padding:15px;

margin-top:15px;

border-radius:10px;

border-left:5px solid #0d5b99;

box-shadow:0 3px 8px rgba(0,0,0,.1);

}

.editBtn{

background:#ff9800;

color:white;

padding:10px 20px;

border:none;

border-radius:8px;

cursor:pointer;

margin-top:10px;

font-size:16px;

}

.editBtn:hover{

background:#e68900;

}

.deleteBtn{

background:#e53935;

color:white;

padding:10px 20px;

border:none;

border-radius:8px;

cursor:pointer;

margin-left:10px;

font-size:16px;

}

.deleteBtn:hover{

background:#c62828;

}

</style>

</head>

<body>

<div class="header">

🏥 SafeDrip Admin Dashboard

</div>

<div class="welcome">

Welcome,

<span id="adminName"></span>

</div>
  
<div class="dashboard">

<div class="sidebar">

<button class="menu active">
🏠 Dashboard
</button>

<button class="menu" onclick="showPatients()">

👤 Patients

</button>

<button class="menu">
🛏 Beds
</button>

<button class="menu">
📡 Transmitters
</button>

<button class="menu">
👨‍⚕️ Doctors
</button>

<button class="menu">
👩‍⚕️ Nurses
</button>

<button class="menu">
📊 Reports
</button>

<button class="menu">
⚙ Settings
</button>


</div>

<div class="content">

<h2>🏥 Hospital Overview</h2>

<div class="stats">

<div class="stat">
<h3>Total Patients</h3>
<p id="totalPatients">0</p>
</div>

<div class="stat">
<h3>Occupied Beds</h3>
<p id="occupiedBeds">0</p>
</div>

<div class="stat">
<h3>Active Transmitters</h3>
<p id="activeTransmitters">1</p>
</div>

<div class="stat">
<h3>Critical Alerts</h3>
<p id="criticalAlerts">0</p>
</div>

</div>

</div>

</div>

<a class="logout" href="login.html">

Logout

</a>

<script>

document.getElementById("adminName").innerHTML =
localStorage.getItem("userName");

function showPatients(){

document.querySelector(".content").innerHTML = `

<h2>👤 Patient Management</h2>

<h3>➕ Add Patient</h3>

<div class="patientForm">

<input id="patientName" type="text" placeholder="Patient Name">

<input id="patientAge" type="number" placeholder="Age">

<select id="patientGender">

<option>Male</option>

<option>Female</option>
<option>Rather Not To Say</option>

</select>

<input id="doctorName" type="text" placeholder="Doctor Name">

<input id="patientFloor" type="text" placeholder="Floor">

<input id="patientWard" type="text" placeholder="Ward">

<input id="patientBed" type="text" placeholder="Bed">

<input id="patientTransmitter" type="text" placeholder="Transmitter">

<button class="addBtn" onclick="savePatient()">

💾 Save Patient

</button>

</div>

<hr>

<h3>📋 Patient List</h3>

<div id="patientList">

No patients added yet.

</div>

`;

loadPatients();

}

const SERVER="https://safedrip-backend.onrender.com";
let editingPatientId = null;

async function savePatient(){

    const patient={

        patientName:document.getElementById("patientName").value,

        age:document.getElementById("patientAge").value,

        gender:document.getElementById("patientGender").value,

        doctor:document.getElementById("doctorName").value,

        floor:document.getElementById("patientFloor").value,

        ward:document.getElementById("patientWard").value,

        bed:document.getElementById("patientBed").value,

        transmitter:document.getElementById("patientTransmitter").value

    };

    let url = SERVER + "/api/patients";

    let method = "POST";

    if(editingPatientId){

        url = SERVER + "/api/patients/" + editingPatientId;

        method = "PUT";

    }

    const response = await fetch(url,{

        method:method,

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(patient)

    });

    const result = await response.json();

    alert(result.message);

    editingPatientId = null;

    document.getElementById("patientName").value="";
    document.getElementById("patientAge").value="";
    document.getElementById("patientGender").value="Male";
    document.getElementById("doctorName").value="";
    document.getElementById("patientFloor").value="";
    document.getElementById("patientWard").value="";
    document.getElementById("patientBed").value="";
    document.getElementById("patientTransmitter").value="";

    loadPatients();

}

async function loadPatients(){

    const response = await fetch(SERVER + "/api/patients");

    const patients = await response.json();

    let html = "";

    if(patients.length === 0){

        html = "No patients added yet.";

    }

    else{

        patients.forEach((patient,index)=>{

            html += `
            <div class="patientCard">

                <h3>${patient.patientName}</h3>

                <p><b>Age:</b> ${patient.age}</p>

                <p><b>Gender:</b> ${patient.gender}</p>

                <p><b>Doctor:</b> ${patient.doctor}</p>

                <p><b>Floor:</b> ${patient.floor}</p>

                <p><b>Ward:</b> ${patient.ward}</p>

                <p><b>Bed:</b> ${patient.bed}</p>

                <p><b>Transmitter:</b> ${patient.transmitter}</p>
                <br>
                <button class="editBtn"
                onclick="editPatient('${patient._id}')">
                ✏ Edit
                </button>

                <button class="deleteBtn"
                onclick="deletePatient('${patient._id}')">
                🗑 Delete
                </button>

                <hr>

            </div>
            `;

        });

    }

    document.getElementById("patientList").innerHTML = html;

}

async function editPatient(id){

editingPatientId = id;

const response = await fetch(
    SERVER + "/api/patients/" + id
);

const patient = await response.json();

document.getElementById("patientName").value =
patient.patientName;

document.getElementById("patientAge").value =
patient.age;

document.getElementById("patientGender").value =
patient.gender;

document.getElementById("doctorName").value =
patient.doctor;

document.getElementById("patientFloor").value =
patient.floor;

document.getElementById("patientWard").value =
patient.ward;

document.getElementById("patientBed").value =
patient.bed;

document.getElementById("patientTransmitter").value =
patient.transmitter;

}

async function deletePatient(id){

    const ok = confirm("Are you sure you want to delete this patient?");

    if(!ok)
        return;

    const response = await fetch(

        SERVER + "/api/patients/" + id,

        {

            method:"DELETE"

        }

    );

    const result = await response.json();

    alert(result.message);

    loadPatients();

}

</script>

</body>

</html>
